<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetHelp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>BetHelp</h1>
        <p>Upload betting slips from your phone, save them, and track your performance.</p>
      </header>

      <section class="panel">
        <h2>New Bet</h2>
        <form id="upload-form">
          <label>
            Bet Name
            <input id="bet-name" name="name" type="text" placeholder="Arsenal vs Chelsea" required />
          </label>

          <div class="two-col">
            <label>
              Stake ($)
              <input id="stake" name="stake" type="number" min="0.01" step="0.01" required />
            </label>
            <label>
              Decimal Odds
              <input id="odds" name="odds" type="number" min="1.01" step="0.01" required />
            </label>
          </div>

          <label>
            Placed At
            <input id="placed-at" name="placedAt" type="datetime-local" />
          </label>

          <label>
            Screenshot
            <input id="screenshot" name="screenshot" type="file" accept="image/*" required />
          </label>

          <div class="paste-box">
            <p>Or paste a screenshot from clipboard</p>
            <button id="paste-button" type="button" class="secondary">Paste From Clipboard</button>
            <textarea
              id="paste-target"
              class="paste-target"
              rows="2"
              readonly
              aria-label="Paste target"
            >Tap "Paste From Clipboard", then use iPhone Paste to attach image.</textarea>
          </div>

          <button type="submit">Upload and Save Bet</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel">
        <h2>Stats</h2>
        <div id="stats-grid" class="stats-grid"></div>
      </section>

      <section class="panel">
        <h2>Bet History</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bet</th>
                <th>Stake</th>
                <th>Odds</th>
                <th>Potential Profit</th>
                <th>Status</th>
                <th>Slip</th>
              </tr>
            </thead>
            <tbody id="bet-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
