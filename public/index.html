<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetHelp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>BetHelp</h1>
        <p>Upload betting slips from your phone, save them, and track your performance.</p>
        <a class="hero-link" href="/desktop">Open Desktop Analysis View</a>
      </header>

      <section class="panel">
        <h2>New Bet</h2>
        <form id="upload-form">
          <label>
            Screenshot
            <input id="screenshot" name="screenshot" type="file" accept="image/*" required />
          </label>

          <label>
            Batch Upload (multiple screenshots)
            <input id="batch-screenshots" name="screenshots" type="file" accept="image/*" multiple />
          </label>

          <div class="paste-box">
            <p>Or paste a screenshot from clipboard</p>
            <button id="paste-button" type="button" class="secondary">Paste From Clipboard</button>
            <textarea
              id="paste-target"
              class="paste-target"
              rows="2"
              readonly
              aria-label="Paste target"
            >Tap "Paste From Clipboard", then use iPhone Paste to attach image.</textarea>
          </div>

          <button type="submit">Upload and Save Bet</button>
          <button id="batch-upload-button" type="button" class="secondary">Batch Upload</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel">
        <h2>Stats</h2>
        <div id="stats-grid" class="stats-grid"></div>
      </section>

      <section class="panel">
        <h2>Bet History</h2>
        <div class="history-toolbar">
          <input id="history-search" type="search" placeholder="Search bet, team, or site" />
          <select id="history-status-filter">
            <option value="all">All statuses</option>
            <option value="pending">Pending</option>
            <option value="won">Won</option>
            <option value="lost">Lost</option>
          </select>
          <select id="history-site-filter">
            <option value="all">All sites</option>
          </select>
        </div>
        <div class="table-controls">
          <label class="density-control" for="history-density">
            Density
            <select id="history-density">
              <option value="compact">Compact</option>
              <option value="comfortable">Comfortable</option>
            </select>
          </label>
          <div class="column-toggles">
            <label><input type="checkbox" data-history-col="placed" checked /> Placed</label>
            <label><input type="checkbox" data-history-col="payout" checked /> Payout</label>
            <label><input type="checkbox" data-history-col="profit" checked /> Potential</label>
            <label><input type="checkbox" data-history-col="confidence" checked /> Confidence</label>
          </div>
        </div>
        <p id="history-summary" class="history-summary"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sticky-col sticky-id col-id">ID</th>
                <th class="sticky-col sticky-bet col-bet">Bet</th>
                <th class="col-placed">Placed</th>
                <th>Site</th>
                <th>Games</th>
                <th>Stake</th>
                <th>Odds</th>
                <th class="col-payout">Payout</th>
                <th class="col-profit">Potential Profit</th>
                <th>Settled</th>
                <th class="col-confidence">Confidence</th>
                <th>Status</th>
                <th>Slip</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bet-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
